        function App() {
          const [phase, setPhase] = useState('permission'); 
          const [navStack, setNavStack] = useState([{ id: 'domain', title: 'BLIND RANK' }]); 
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState(null);
          const [slots, setSlots] = useState(Array(10).fill(null));
          const [queue, setQueue] = useState([]);
          const [activeIndex, setActiveIndex] = useState(0);
          const [hasStarted, setHasStarted] = useState(false); 
          const [rolling, setRolling] = useState(false);
          const [flashSlot, setFlashSlot] = useState(null);
          const [challengeTitle, setChallengeTitle] = useState("BLIND RANK");
          const [activeOverride, setActiveOverride] = useState(null);
          const [recordStatus, setRecordStatus] = useState('idle'); 
          const [recordedVideoUrl, setRecordedVideoUrl] = useState(null);
          const [aiStatus, setAiStatus] = useState('waiting');
          const [lastAction, setLastAction] = useState(null);
          const [isFullscreen, setIsFullscreen] = useState(false);

          const videoRef = useRef(null);
          const bgVideoRef = useRef(null);
          const streamRef = useRef(null); 
          const canvasRef = useRef(null); 
          const cardRef = useRef(null);   
          const mediaRecorderRef = useRef(null);
          const timerRef = useRef(null);
          const chunksRef = useRef([]);
          const particlesRef = useRef([]);
          
          const posRef = useRef({ 
              targetX: window.innerWidth / 2, targetY: window.innerHeight * 0.25, targetScale: 0.85, targetRot: 0,
              detected: false, framesLost: 0,
              domX: window.innerWidth / 2, domY: window.innerHeight * 0.25, domScale: 0.85, domRot: 0,
              canvasX: 1080 / 2, canvasY: 1920 * 0.25, canvasScale: 0.85, canvasRot: 0,
              box: null, vw: 1, vh: 1
          });
          const latestState = useRef({
              slots: Array(10).fill(null), activeIndex: 0, queue: [], phase: 'menu', rolling: false, hasStarted: false
          });
          const isRecordingRef = useRef(false);
          const tickRef = useRef(null);
          const aiTickRef = useRef(null);
          const startTimeRef = useRef(0);
          const aiStatusRef = useRef('waiting');
          
          const resultTimeoutRef = useRef(null); 
          const lastCategoryRef = useRef(null);  
          const lastCategoryTypeRef = useRef(null);
          const faceIndicatorRef = useRef(null); 
          const progressRef = useRef(null);     

          const currentNavObj = navStack[navStack.length - 1];
          const currentMenuId = currentNavObj.id;
          const currentMenuItems = MENU_DATA[currentMenuId] || [];
          
          let activeTheme = THEME.movies;
          const topDomain = navStack[1]?.id; 
          if (activeOverride && THEME[activeOverride]) {
              activeTheme = THEME[activeOverride];
          } else {
              if (topDomain && THEME[topDomain]) activeTheme = THEME[topDomain];
          }
          const themeRef = useRef(activeTheme);

          // Audio System 
          const initAudio = () => {
              if (!window._audioCtx) {
                  const AudioContext = window.AudioContext || window.webkitAudioContext;
                  if (AudioContext) window._audioCtx = new AudioContext();
              }
              if (window._audioCtx && window._audioCtx.state === 'suspended') window._audioCtx.resume();
          };

          const playSound = (type) => {
              try {
                  const ctx = window._audioCtx;
                  if (!ctx || ctx.state !== 'running') return;
                  const now = ctx.currentTime;
                  
                  if (type === 'thud') {
                      const osc = ctx.createOscillator(); const gain = ctx.createGain();
                      osc.connect(gain); gain.connect(ctx.destination);
                      osc.type = 'sine'; osc.frequency.setValueAtTime(120, now); osc.frequency.exponentialRampToValueAtTime(30, now + 0.1);
                      gain.gain.setValueAtTime(1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                      osc.start(now); osc.stop(now + 0.2);
                  } else if (type === 'swoosh') {
                      const osc = ctx.createOscillator(); const gain = ctx.createGain();
                      osc.connect(gain); gain.connect(ctx.destination);
                      osc.type = 'triangle'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
                      gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.25, now + 0.05); gain.gain.linearRampToValueAtTime(0, now + 0.3);
                      osc.start(now); osc.stop(now + 0.35);
                  } else if (type === 'pop') {
                      const osc = ctx.createOscillator(); const gain = ctx.createGain();
                      osc.connect(gain); gain.connect(ctx.destination);
                      osc.type = 'sine'; osc.frequency.setValueAtTime(600, now); osc.frequency.exponentialRampToValueAtTime(300, now + 0.05);
                      gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                      osc.start(now); osc.stop(now + 0.1);
                  } else if (type === 'cheer') {
                      const notes = [440, 554.37, 659.25, 880, 1108.73]; 
                      notes.forEach((freq, i) => {
                          const o = ctx.createOscillator(); const g = ctx.createGain();
                          o.connect(g); g.connect(ctx.destination);
                          o.type = 'triangle'; o.frequency.value = freq;
                          g.gain.setValueAtTime(0, now + i * 0.08); g.gain.linearRampToValueAtTime(0.2, now + i * 0.08 + 0.05); g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 1.0);
                          o.start(now + i * 0.08); o.stop(now + i * 0.08 + 1.2);
                      });
                  }
              } catch(e) {}
          };

          const toggleFullscreen = () => {
              if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
              else document.exitFullscreen().catch(() => {});
          };

          useEffect(() => {
              const handleFsChange = () => setIsFullscreen(!!document.fullscreenElement);
              document.addEventListener('fullscreenchange', handleFsChange);
              return () => document.removeEventListener('fullscreenchange', handleFsChange);
          }, []);

          useEffect(() => { latestState.current = { slots, activeIndex, queue, phase, rolling, hasStarted }; }, [slots, activeIndex, queue, phase, rolling, hasStarted]);
          useEffect(() => { themeRef.current = activeTheme; }, [activeTheme]);

                      gradient.addColorStop(0, 'rgba(0,0,0,0.6)'); gradient.addColorStop(0.2, 'rgba(0,0,0,0)');
                      gradient.addColorStop(0.8, 'rgba(0,0,0,0)'); gradient.addColorStop(1, 'rgba(0,0,0,0.8)');

                              ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowBlur = 10;

                                  }

                                  const tagW = cardSize * 1.2; const tagH = 68;
                                  ctx.fillStyle = themeRef.current.primary; ctx.beginPath(); ctx.roundRect(-tagW/2, halfSize + 15, tagW, tagH, 24); ctx.fill();
                                  ctx.fillStyle = '#030305'; ctx.font = `900 32px "Outfit", sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                                  
                                  let dispName = (st.rolling ? "SELECTING..." : activeItem.name.split(' (')[0]).toUpperCase();
                                  if (ctx.measureText(dispName).width > tagW - 40) dispName = dispName.substring(0, 16) + '...';
                                  ctx.fillText(dispName, 0, halfSize + 15 + tagH/2 + 2);

                              }
                          }

                          ctx.fillText("BLIND RANK", CW - 50, CH - 90);

                 setRecordedVideoUrl({ url: URL.createObjectURL(blob), ext: blob.type.includes('mp4') ? 'mp4' : 'webm' });

          const processSessionAndLaunch = async (sessionPool) => {

          const fetchTMDB = async (e, p=1) => {

          const startWikiChallenge = async (item) => {

                const rest = pool.filter(q => q.n !== anchor.n).sort(() => Math.random() - 0.5);
                const searchOrder = [anchor, ...rest].slice(0, 45);
                const fetchedCustom = await Promise.all(searchOrder.map(async qObj => {
                    let url = '';

                        if (path) return { id: qObj.n, name: qObj.n, img: `https://image.tmdb.org/t/p/w500${path}` };

                }));

          const startTMDBChallenge = async (item) => {

              // BULLETPROOF FALLBACK: If the trending endpoint didn't return enough data for some reason,

              if (validMedia.length < 10) {
                  const fallbackEndpoint = item.endpoint.includes('/tv') ? '/discover/tv?sort_by=popularity.desc' : '/discover/movie?sort_by=popularity.desc';
                  const fallbackResults = await Promise.all([1, 2].map(p => fetchTMDB(fallbackEndpoint, p)));
                  const fallbackMedia = fallbackResults.flatMap(r => r?.results || []).filter(m => m.poster_path && (m.title || m.name));
                  validMedia = [...validMedia, ...fallbackMedia];
              }

              const unique = Array.from(new Map(validMedia.map(m => [m.id, { 
                  id: m.id, 
                  name: m.title || m.name, 
                  img: `https://image.tmdb.org/t/p/w500${m.poster_path}` 
              }])).values());
              
              if (unique.length < 10) { setError("Not enough data found from API."); setLoading(false); return; }

              const rest = unique.filter(m => m.id !== anchor.id).sort(() => Math.random() - 0.5);

                          <AlertCircle size={22} /> SCREEN RECORDING UNSUPPORTED
                       </div>
                    )}
                    {recordStatus === 'compiling' && (
                      <div className="w-full py-5 rounded-[28px] glass-ultra text-white display-font font-black tracking-widest text-[14px] flex items-center justify-center gap-4 border-white/30 shadow-xl">
                        <Loader2 className="animate-spin text-white" size={26} /> COMPILING HD VIDEO...
                      </div>
                    )}
                    {recordStatus === 'ready' && recordedVideoUrl && (
                      <a href={recordedVideoUrl.url} download={`BlindRankPro_${Date.now()}.${recordedVideoUrl.ext}`} className="w-full py-5 rounded-[28px] display-font font-black tracking-[0.15em] text-[15px] flex flex-col items-center justify-center gap-1 active:scale-[0.98] transition-all border border-white/30" style={{ background: `linear-gradient(135deg, ${activeTheme.primary}, ${activeTheme.secondary})`, color: (topDomain !== 'movies' && topDomain !== 'tv' && topDomain !== 'actors' ? '#fff' : '#030305'), boxShadow: `0 20px 50px ${activeTheme.shadow}` }}>
                        <div className="flex items-center gap-3"><DownloadIcon size={24} /> DOWNLOAD & SHARE</div>
                        <span className="text-[10px] tracking-widest opacity-80 uppercase font-bold">Post to TikTok / Instagram</span>
                      </a>
                    )}

                    <button onClick={() => {
                      const text = `🏆 My Blind Rank: ${challengeTitle}\n${slots.filter(p=>p).map((p, i) => `${i + 1}. ${p?.name.split(' (')[0]}`).join('\n')}`;
                      if (navigator.share) navigator.share({ title: 'Blind Rank', text });
                    }} className="w-full py-5 rounded-[28px] glass-ultra text-white display-font font-black tracking-[0.15em] text-[14px] flex items-center justify-center gap-3 active:scale-[0.98] hover:bg-white/20 transition-all border-white/30 shadow-xl">
                      <Share2 size={22} /> SHARE RANKING LIST
                    </button>

                    {lastCategoryRef.current && (
                      <button onClick={playAgain} className="w-full py-4 mt-2 rounded-[28px] display-font font-black tracking-[0.15em] text-[13px] flex items-center justify-center gap-3 active:scale-[0.98] transition-all border bg-black/60 backdrop-blur-xl hover:bg-white/10" style={{ borderColor: activeTheme.primary + '50', color: activeTheme.primary, shadow: `0 15px 40px ${activeTheme.shadow}` }}>
                        <RepeatIcon size={20} /> PLAY AGAIN
                      </button>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
