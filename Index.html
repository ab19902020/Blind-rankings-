              if (window._audioCtx && window._audioCtx.state === 'suspended') {
                  window._audioCtx.resume();
              }
          };

          const playSound = (type) => {
              try {
                  const ctx = window._audioCtx;
                  if (!ctx || ctx.state !== 'running') return;
                  const now = ctx.currentTime;
                  
                  if (type === 'thud') {
                      const osc = ctx.createOscillator();
                      const gain = ctx.createGain();
                      osc.connect(gain);
                      gain.connect(ctx.destination);
                      osc.type = 'sine';
                      osc.frequency.setValueAtTime(120, now);
                      osc.frequency.exponentialRampToValueAtTime(30, now + 0.1);
                      gain.gain.setValueAtTime(1, now);
                      gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                      osc.start(now);
                      osc.stop(now + 0.2);
                  } else if (type === 'swoosh') {
                      const osc = ctx.createOscillator();
                      const gain = ctx.createGain();
                      osc.connect(gain);
                      gain.connect(ctx.destination);
                      osc.type = 'triangle';
                      osc.frequency.setValueAtTime(300, now);
                      osc.frequency.exponentialRampToValueAtTime(50, now + 0.2);
                      gain.gain.setValueAtTime(0, now);
                      gain.gain.linearRampToValueAtTime(0.25, now + 0.05);
                      gain.gain.linearRampToValueAtTime(0, now + 0.3);
                      osc.start(now);
                      osc.stop(now + 0.35);
                  } else if (type === 'cheer') {
                      const notes = [440, 554.37, 659.25, 880]; 
                      notes.forEach((freq, i) => {
                          const o = ctx.createOscillator();
                          const g = ctx.createGain();
                          o.connect(g);
                          g.connect(ctx.destination);
                          o.type = 'sine';
                          o.frequency.value = freq;
                          g.gain.setValueAtTime(0, now + i * 0.1);
                          g.gain.linearRampToValueAtTime(0.2, now + i * 0.1 + 0.05);
                          g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.6);
                          o.start(now + i * 0.1);
                          o.stop(now + i * 0.1 + 0.7);
                      });
                  }
              } catch(e) {}
          };

          const toggleFullscreen = () => {
              if (!document.fullscreenElement) {
                  document.documentElement.requestFullscreen().catch(() => {});
              } else {
                  document.exitFullscreen().catch(() => {});
              }
          };

          useEffect(() => {
              const handleFsChange = () => setIsFullscreen(!!document.fullscreenElement);
              document.addEventListener('fullscreenchange', handleFsChange);
              return () => document.removeEventListener('fullscreenchange', handleFsChange);
          }, []);

          useEffect(() => { 
              latestState.current = { slots, activeIndex, queue, phase, rolling, hasStarted };
          }, [slots, activeIndex, queue, phase, rolling, hasStarted]);

          useEffect(() => { themeRef.current = activeTheme; }, [activeTheme]);

          useEffect(() => {
              if (progressRef.current) {
                  const placed = slots.filter(Boolean).length;
                  progressRef.current.innerText = `${placed}/10`;
              }
          }, [slots]);

          useEffect(() => {
            let active = true;
            let isDetecting = false;
            
            async function initEngine() {
              try {
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                  const stream = await navigator.mediaDevices.getUserMedia({

                  streamRef.current = stream; 
                  if (active && videoRef.current) {
                      videoRef.current.srcObject = stream;
                      videoRef.current.onloadedmetadata = async () => {
                          try { await videoRef.current.play(); }

                  }
                }
              } catch (err) {

              }

              if (window.faceapi) {
                  try {
                      await faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api@1.7.12/model/');
                      setAiStatus('ready');
                      aiStatusRef.current = 'ready';
                  } catch (e) {
                      setAiStatus('error');
                      aiStatusRef.current = 'error';
                  }
              }

              aiTickRef.current = setInterval(async () => {
                  if (!active || !videoRef.current || videoRef.current.readyState < 2 || aiStatusRef.current !== 'ready' || isDetecting) return;
                  isDetecting = true;
                  try {
                      const detection = await faceapi.detectSingleFace(videoRef.current, new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.2 }));
                      const p = posRef.current;
                      if (detection) {
                          p.detected = true; p.framesLost = 0; p.box = detection.box;
                          p.vw = videoRef.current.videoWidth; p.vh = videoRef.current.videoHeight;
                      } else { 
                          p.framesLost++;
                          if (p.framesLost > 5) p.detected = false; 
                      }
                      if (faceIndicatorRef.current) {
                          faceIndicatorRef.current.style.backgroundColor = p.detected ? '#4ade80' : 'rgba(255,255,255,0.25)';
                          faceIndicatorRef.current.title = p.detected ? 'Face detected' : 'No face';
                      }
                  } catch (e) { console.error(e); } finally { isDetecting = false; }
              }, 80);

              tickRef.current = setInterval(() => { 
                  if (latestState.current.phase === 'playing' && latestState.current.hasStarted && timerRef.current) {
                      timerRef.current.innerText = fmt(Date.now() - startTimeRef.current);
                  } 
              }, 50);

              const loop = () => {
                  if (!active) return;
                  const video = videoRef.current;
                  const sw = window.innerWidth, sh = window.innerHeight;
                  const p = posRef.current;
                  const st = latestState.current;

                  if (st.phase === 'playing') {
                      if (video && video.videoWidth > 0 && p.detected && p.box) {
                          const vw = p.vw, vh = p.vh;
                          const scale = Math.max(sw / vw, sh / vh);
                          const drawW = vw * scale, drawH = vh * scale;
                          const offsetX = (sw - drawW) / 2, offsetY = (sh - drawH) / 2;
                          const faceCenterX = p.box.x + p.box.width / 2;
                          const faceTopY = p.box.y;
                          let domX = offsetX + (faceCenterX * scale);
                          let domY = offsetY + (faceTopY * scale);
                          domX = sw - domX;
                          const faceHeightDOM = p.box.height * scale;
                          const faceWidthDOM = p.box.width * scale;
                          domY = domY - (faceHeightDOM * 0.4);
                          p.targetX = domX;
                          p.targetY = Math.max(sh * 0.1, Math.min(sh * 0.9, domY)); 
                          p.targetScale = Math.min(1.2, Math.max(0.65, faceWidthDOM / 150)); 
                          const velX = p.targetX - p.domX;
                          p.targetRot = Math.max(-15, Math.min(15, velX * 0.08));
                      } else {
                          p.targetX = sw / 2; p.targetY = sh * 0.25; p.targetScale = 0.85; p.targetRot = 0;
                      }
                      
                      p.domX += (p.targetX - p.domX) * 0.25;
                      p.domY += (p.targetY - p.domY) * 0.25;
                      p.domScale += (p.targetScale - p.domScale) * 0.25;
                      p.domRot += (p.targetRot - p.domRot) * 0.25;

                      if (cardRef.current) {
                          if (!st.hasStarted) {
                              cardRef.current.classList.add('opacity-0', 'scale-50');
                              cardRef.current.classList.remove('opacity-100');
                          } else {
                              cardRef.current.classList.remove('opacity-0', 'scale-50');
                              cardRef.current.classList.add('opacity-100');
                              cardRef.current.style.left = `${p.domX}px`;
                              cardRef.current.style.top = `${p.domY}px`;
                              cardRef.current.style.transform = `translate(-50%, -50%) scale(${p.domScale}) rotate(${p.domRot}deg)`;
                          }
                      }
                  } else {
                      if (cardRef.current) {
                          cardRef.current.classList.add('opacity-0');
                          cardRef.current.classList.remove('opacity-100');
                      }
                  }

                  if (isRecordingRef.current && canvasRef.current && video && video.videoWidth > 0) {
                      const canvas = canvasRef.current;
                      const ctx = canvas.getContext('2d', { alpha: false });
                      const CW = 1080, CH = 1920; 
                      canvas.width = CW; canvas.height = CH;
                      ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
                      const vw = video.videoWidth, vh = video.videoHeight;
                      const scaleC = Math.max(CW / vw, CH / vh);
                      const cDrawW = vw * scaleC, cDrawH = vh * scaleC;
                      const cOffsetX = (CW - cDrawW) / 2, cOffsetY = (CH - cDrawH) / 2;
                      ctx.save(); ctx.translate(CW, 0); ctx.scale(-1, 1); 
                      ctx.drawImage(video, cOffsetX, cOffsetY, cDrawW, cDrawH);
                      ctx.restore();
                      if (st.hasStarted) {
                          let targetCx = CW / 2, targetCy = CH * 0.25;
                          if (p.detected && p.box) {
                              const faceCenterX = p.box.x + p.box.width / 2;
                              const faceTopY = p.box.y;
                              targetCx = CW - (cOffsetX + (faceCenterX * scaleC));
                              targetCy = cOffsetY + (faceTopY * scaleC) - (p.box.height * scaleC * 0.4); 
                              targetCy = Math.max(CH * 0.1, Math.min(CH * 0.9, targetCy));
                          }
                          p.canvasX += (targetCx - p.canvasX) * 0.25;
                          p.canvasY += (targetCy - p.canvasY) * 0.25;
                          p.canvasScale += (p.targetScale - p.canvasScale) * 0.25;
                          const cVelX = targetCx - p.canvasX;
                          p.canvasRot += (Math.max(-15, Math.min(15, cVelX * 0.05)) - p.canvasRot) * 0.25;
                          const gradient = ctx.createLinearGradient(0, 0, 0, CH);
                          gradient.addColorStop(0, 'rgba(0,0,0,0.5)'); gradient.addColorStop(0.15, 'rgba(0,0,0,0)');
                          gradient.addColorStop(0.85, 'rgba(0,0,0,0)'); gradient.addColorStop(1, 'rgba(0,0,0,0.6)');
                          ctx.fillStyle = gradient; ctx.fillRect(0, 0, CW, CH);
                          const scaleX = CW / sw; const scaleY = CH / sh;
                          const sbLeft = 16 * scaleX; 
                          const sbTop = CH * 0.15, sbBottom = CH * 0.12;
                          const slotH = (CH - sbTop - sbBottom) / 10;
                          const boxSize = slotH - (12 * scaleY);
                          const boxX = sbLeft + (36 * scaleX);
                          ctx.fillStyle = 'rgba(255,255,255,0.15)'; 
                          ctx.fillRect(boxX + boxSize/2 - 2, sbTop, 4, CH - sbTop - sbBottom);
                          st.slots.forEach((slotData, i) => {
                              const y = sbTop + i * slotH + (6 * scaleY); 
                              ctx.fillStyle = slotData ? '#ffffff' : 'rgba(255,255,255,0.4)';
                              ctx.font = `900 ${22 * scaleY}px "Outfit", sans-serif`; 
                              ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
                              ctx.fillText(i + 1, boxX - (12 * scaleX), y + boxSize/2);
                              ctx.fillStyle = slotData ? 'rgba(255,255,255,0.15)' : 'rgba(3,3,5,0.6)';
                              ctx.beginPath(); ctx.roundRect(boxX, y, boxSize, boxSize, 14 * scaleX); ctx.fill();
                              ctx.strokeStyle = slotData ? themeRef.current.primary : 'rgba(255,255,255,0.15)';
                              ctx.lineWidth = slotData ? 4 : 2; ctx.stroke();
                              if (!slotData) {
                                  ctx.fillStyle = 'rgba(255,255,255,0.3)'; 
                                  ctx.beginPath(); ctx.arc(boxX + boxSize/2, y + boxSize/2, 4 * scaleX, 0, Math.PI*2); ctx.fill(); 
                              }
                              if (slotData?.imgObj && slotData.imgObj.complete) {
                                  ctx.save(); ctx.beginPath(); ctx.roundRect(boxX + 2, y + 2, boxSize - 4, boxSize - 4, 12 * scaleX); ctx.clip();
                                  ctx.fillStyle = '#ffffff'; ctx.fillRect(boxX + 2, y + 2, boxSize - 4, boxSize - 4); // White bg for transparent logos
                                  const iw = slotData.imgObj.width, ih = slotData.imgObj.height;
                                  const innerSize = boxSize - 4;
                                  const ratio = Math.max(innerSize / iw, innerSize / ih);
                                  const drawW = iw * ratio, drawH = ih * ratio;
                                  ctx.drawImage(slotData.imgObj, boxX + 2 + (innerSize - drawW)/2, y + 2 + (innerSize - drawH)/2, drawW, drawH); 
                                  ctx.restore();
                              }
                          });
                          const activeItem = st.queue[st.activeIndex];
                          if (activeItem) {
                              ctx.save();
                              ctx.translate(p.canvasX, p.canvasY); 
                              ctx.scale(p.canvasScale, p.canvasScale);
                              ctx.rotate(p.canvasRot * Math.PI / 180);
                              const cardSize = 144 * scaleX; const halfSize = cardSize / 2;
                              ctx.shadowColor = themeRef.current.primary; ctx.shadowBlur = 50;
                              ctx.fillStyle = '#030305'; ctx.beginPath(); ctx.roundRect(-halfSize, -halfSize, cardSize, cardSize, 32 * scaleX); ctx.fill();
                              ctx.shadowBlur = 0; ctx.lineWidth = 6 * scaleX; ctx.strokeStyle = themeRef.current.primary; ctx.stroke();
                              if (activeItem.imgObj && activeItem.imgObj.complete && !st.rolling) {
                                  const imgS = cardSize - (12 * scaleX); const imgH = imgS / 2;
                                  ctx.save(); ctx.beginPath(); ctx.roundRect(-imgH, -imgH, imgS, imgS, 24 * scaleX); ctx.clip();
                                  ctx.fillStyle = '#ffffff'; ctx.fillRect(-imgH, -imgH, imgS, imgS); // White bg for transparent logos
                                  const iw = activeItem.imgObj.width, ih = activeItem.imgObj.height;
                                  let dw = imgS, dh = imgS; if (iw/ih > 1) dw = dh * (iw/ih); else dh = dw / (iw/ih); 
                                  ctx.drawImage(activeItem.imgObj, -imgH + (imgS-dw)/2, -imgH + (imgS-dh)/2, dw, dh); ctx.restore();
                              }
                              ctx.fillStyle = themeRef.current.primary; ctx.beginPath(); ctx.roundRect(-halfSize * 1.2, halfSize + (12 * scaleX), cardSize * 1.2, 44 * scaleX, 16 * scaleX); ctx.fill();
                              ctx.fillStyle = '#030305'; ctx.font = `900 ${16 * scaleX}px "Outfit", sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                              ctx.fillText((st.rolling ? "SELECTING..." : activeItem.name.split(' (')[0]).toUpperCase(), 0, halfSize + (34 * scaleX));
                              ctx.restore();
                          }
                      }
                  }
                  requestAnimationFrame(loop);
              };
              loop();
            }
            initEngine();
            return () => { active = false; if(tickRef.current) clearInterval(tickRef.current); if(aiTickRef.current) clearInterval(aiTickRef.current); };
          }, []);

          useEffect(() => {
              if (phase === 'result' && isRecordingRef.current) stopRecordingAndCompile();
          }, [phase]);

          const startRecording = async () => {
            if (recordStatus !== 'idle' && recordStatus !== 'error') return;
            chunksRef.current = [];
            isRecordingRef.current = true;
            try {
              if (!canvasRef.current || !canvasRef.current.captureStream) throw new Error("captureStream missing");
              const canvasStream = canvasRef.current.captureStream(30);
              const audioTracks = streamRef.current?.getAudioTracks() || [];
              if (audioTracks.length > 0) canvasStream.addTrack(audioTracks[0]);
              let options;
              const mimeTypes = ['video/webm;codecs=h264,opus', 'video/webm;codecs=vp8,opus', 'video/webm;codecs=vp9,opus', 'video/webm', 'video/mp4'];
              for (const mime of mimeTypes) {
                  if (MediaRecorder.isTypeSupported(mime)) { options = { mimeType: mime, videoBitsPerSecond: 8000000, audioBitsPerSecond: 128000 }; break; }
              }
              mediaRecorderRef.current = new MediaRecorder(canvasStream, options);
              mediaRecorderRef.current.ondataavailable = e => { if (e.data && e.data.size > 0) chunksRef.current.push(e.data); };
              mediaRecorderRef.current.onstop = () => {
                 isRecordingRef.current = false;
                 if (chunksRef.current.length === 0) { setRecordStatus('error'); return; }
                 const blob = new Blob(chunksRef.current, { type: mediaRecorderRef.current.mimeType || options.mimeType });
                 setRecordedVideoUrl({ url: URL.createObjectURL(blob), ext: blob.type.includes('mp4') ? 'mp4' : 'webm' });
                 setRecordStatus('ready'); 
              };
              mediaRecorderRef.current.start(100);
              setRecordStatus('recording');
            } catch (e) { 
              isRecordingRef.current = false;
              setError("Screen recording unsupported on this browser."); 
              setRecordStatus('error');
            }
          };

          const startGameplay = () => {
              initAudio();
              setHasStarted(true);

            if (mediaRecorderRef.current && mediaRecorderRef.current.state !== 'inactive') {

               if (chunksRef.current.length > 0) setRecordStatus('ready'); else setRecordStatus('error');
            }
          };

          const processSessionAndLaunch = async (sessionPool) => {
             setLoading(true);
             try {
                 const enrichedSession = [];
                 for (let i = 0; i < sessionPool.length; i++) {
                     if (enrichedSession.length >= 10) break;

                     if (!item || !item.img) continue;
                     const loadedObj = await new Promise(resolve => {
                         const img = new Image();
                         img.crossOrigin = "anonymous";
                         img.onload = () => resolve({ ...item, imgObj: img });
                         img.onerror = () => resolve(null);

                     });
                     if (loadedObj) enrichedSession.push(loadedObj);
                 }
                 if (enrichedSession.length < 10) { 
                     setError(`Not enough valid images found (${enrichedSession.length}/10). Try another category.`);

                 setQueue(enrichedSession);

          const fetchTMDB = async (e, p=1) => { 
              try { 
                  const sep = e.includes('?') ? '&' : '?';

                  return res.ok ? await res.json() : null; 
              } catch(x) { return null; } 
          };

          // Wikipedia Fetcher: NO API KEY REQUIRED, PERFECT FOR BRANDS, ATHLETES, GAMES, ETC.
          const fetchWiki = async (query) => {
              try {
                  const cleanQuery = query.split(' (')[0]; // Clean up things like "Mario (franchise)" for better search
                  const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(query)}&prop=pageimages&format=json&pithumbsize=500&origin=*`);
                  const data = await res.json();
                  const pages = data.query.pages;
                  const pageId = Object.keys(pages)[0];
                  if (pageId !== "-1" && pages[pageId].thumbnail) {
                      return pages[pageId].thumbnail.source;
                  }
                  // Fallback: search wikipedia and get the first result's image
                  const searchRes = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(cleanQuery)}&utf8=&format=json&origin=*`);
                  const searchData = await searchRes.json();
                  if (searchData.query.search.length > 0) {
                      const title = searchData.query.search[0].title;
                      const res2 = await fetch(`https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&format=json&pithumbsize=500&origin=*`);
                      const data2 = await res2.json();
                      const pages2 = data2.query.pages;
                      const pageId2 = Object.keys(pages2)[0];
                      if (pageId2 !== "-1" && pages2[pageId2].thumbnail) {
                          return pages2[pageId2].thumbnail.source;
                      }
                  }
                  return null;
              } catch (e) { return null; }
          };

          const startPersonChallenge = async (item) => {
            setLoading(true); setError(null); 
            try {
              // Get a large pool to ensure we hit 10 valid images, since some might fail
              const pool = [...item.roster].sort(() => Math.random() - 0.5);
              const searchOrder = pool.slice(0, Math.max(15, pool.length));
              
              const fetchedPlayers = await Promise.all(searchOrder.map(async name => {
                  let img = null;
                  // Try TMDB first (good for popular athletes/actors)
                  const res = await fetchTMDB(`/search/person?query=${encodeURIComponent(name)}`);
                  if (res?.results?.length > 0 && res.results[0].profile_path) {
                      img = `https://image.tmdb.org/t/p/w500${res.results[0].profile_path}`;
                  } else {
                      // Fallback to Wikipedia (good for obscure athletes, older legends)
                      img = await fetchWiki(name);
                  }
                  if (img) return { id: name, name, img };
                  return null;
              }));
              const validPlayers = fetchedPlayers.filter(Boolean);
              if (validPlayers.length < 10) { setError(`Not enough images found (${validPlayers.length}/10).`); setLoading(false); return; }
              setChallengeTitle(item.name); processSessionAndLaunch(validPlayers);
            } catch (e) { setError("Database sync error."); setLoading(false); }
          };

          const startWikiChallenge = async (item) => {
            setLoading(true); setError(null);
            try {
                const pool = [...item.items].sort(() => Math.random() - 0.5);
                // Grab up to 20 to ensure we find 10 valid images
                const searchOrder = pool.slice(0, Math.min(20, pool.length));
                
                const fetchedItems = await Promise.all(searchOrder.map(async name => {
                    const img = await fetchWiki(name);
                    if (img) return { id: name, name: name.split(' (')[0], img };
                    return null;
                }));
                const validResults = fetchedItems.filter(Boolean);
                if (validResults.length < 10) { setError(`Not enough data found (${validResults.length}/10). Try again.`); setLoading(false); return; }
                
                setChallengeTitle(item.name); processSessionAndLaunch(validResults);
            } catch(e) { setError("Failed to load category."); setLoading(false); }
          };

          const startCustomChallenge = async (item) => {
            setLoading(true); setError(null);
            try {
                const pool = [...item.queries];
                const top3Anchors = pool.slice(0, 3);
                const anchor = top3Anchors[Math.floor(Math.random() * Math.min(3, top3Anchors.length))];
                const restQueries = pool.filter(q => q.n !== anchor.n).sort(() => Math.random() - 0.5);
                const searchOrder = [anchor, ...restQueries];
                const fetchedCustom = await Promise.all(searchOrder.map(async qObj => {
                    let url = '';
                    if (qObj.t === 'person') url = `/search/person?query=${encodeURIComponent(qObj.q)}`;
                    else if (qObj.t === 'tv') url = `/search/tv?query=${encodeURIComponent(qObj.q)}`;
                    else url = `/search/movie?query=${encodeURIComponent(qObj.q)}`;
                    const res = await fetchTMDB(url);
                    if (res?.results?.length > 0) {
                        const path = res.results[0].profile_path || res.results[0].poster_path;
                        if (path) return { id: qObj.n, name: qObj.n, img: `https://image.tmdb.org/t/p/w500${path}` };
                    }
                    return null;
                }));
                const validResults = fetchedCustom.filter(Boolean);
                if (validResults.length < 10) { setError("Not enough data found."); setLoading(false); return; }
                setChallengeTitle(item.name); processSessionAndLaunch(validResults);
            } catch(e) { setError("Failed to load category."); setLoading(false); }
          };

          const startTMDBChallenge = async (item) => {
            setLoading(true); setError(null); 
            try {
              const results = await Promise.all([ fetchTMDB(item.endpoint, 1), fetchTMDB(item.endpoint, 2) ]);
              const allMedia = results.flatMap(r => r?.results || []);
              const unique = Array.from(new Map(allMedia.filter(m => m.poster_path && (m.title || m.name)).map(m => [m.id, { id: m.id, name: m.title || m.name, img: `https://image.tmdb.org/t/p/w500${m.poster_path}` }])).values());
              if (unique.length < 10) { setError("Not enough data found from API."); setLoading(false); return; }
              const top3 = unique.slice(0, 3);
              const anchor = top3[Math.floor(Math.random() * top3.length)];
              const rest = unique.filter(m => m.id !== anchor.id).sort(() => Math.random() - 0.5);
              const finalPool = [anchor, ...rest]; 
              setChallengeTitle(item.name); processSessionAndLaunch(finalPool);
            } catch (e) { setError("Error syncing with Database."); setLoading(false); }
          };

          const playAgain = () => {
            if (!lastCategoryRef.current) return;
            const item = lastCategoryRef.current;
            const type = lastCategoryTypeRef.current;
            if (type === 'person') startPersonChallenge(item);
            else if (type === 'tmdb') startTMDBChallenge(item);
            else if (type === 'custom') startCustomChallenge(item);
            else if (type === 'wiki') startWikiChallenge(item);
          };

          const handleMenuClick = (item) => {
              initAudio();
              if (item.type === 'nav') { setNavStack([...navStack, { id: item.id, title: item.name }]); } 
              else if (item.type === 'game') {
                  if (item.themeOverride) setActiveOverride(item.themeOverride);
                  lastCategoryRef.current = item;
                  if (item.roster) { lastCategoryTypeRef.current = 'person'; startPersonChallenge(item); }
                  else if (item.endpoint) { lastCategoryTypeRef.current = 'tmdb'; startTMDBChallenge(item); }
              } 
              else if (item.type === 'custom') {
                  if (item.themeOverride) setActiveOverride(item.themeOverride);
                  lastCategoryRef.current = item;
                  lastCategoryTypeRef.current = 'custom';
                  startCustomChallenge(item);
              }
              else if (item.type === 'wiki') {
                  if (item.themeOverride) setActiveOverride(item.themeOverride);
                  lastCategoryRef.current = item;
                  lastCategoryTypeRef.current = 'wiki';
                  startWikiChallenge(item);
              }
          };

          const place = (i) => {
            if (!hasStarted || slots[i] !== null || rolling || activeIndex >= queue.length) return;
            if (navigator.vibrate) navigator.vibrate(40);
            playSound('thud');
            const n = [...slots]; 
            n[i] = queue[activeIndex];
            setSlots(n); 
            setFlashSlot(i); setTimeout(() => setFlashSlot(null), 300);
            setLastAction({ slotIndex: i, queueIndex: activeIndex });
            const nextIdx = activeIndex + 1;
            if (nextIdx >= queue.length || n.filter(x=>x).length >= queue.length) { 
                resultTimeoutRef.current = setTimeout(() => { 
                    resultTimeoutRef.current = null;
                    playSound('cheer');
                    setPhase('result'); 
                }, 600); 
            } else { 
                setRolling(true);
                setTimeout(() => playSound('swoosh'), 200);
                setTimeout(() => { setActiveIndex(nextIdx); setRolling(false); }, 800);
            }
          };

          const undo = () => {
            if (!lastAction || rolling) return;
            if (navigator.vibrate) navigator.vibrate([20, 10, 20]);
            playSound('swoosh');
            if (resultTimeoutRef.current) {
                clearTimeout(resultTimeoutRef.current);
                resultTimeoutRef.current = null;
            }
            const n = [...slots];
            n[lastAction.slotIndex] = null;
            setSlots(n);
            setActiveIndex(lastAction.queueIndex);
            setLastAction(null);
            setPhase('playing');
          };

          const back = () => {
            setError(null); setLoading(false); setActiveOverride(null);
            if (chunksRef.current.length > 0) stopRecordingAndCompile();
            if (navStack.length > 1) setNavStack(p => p.slice(0, -1)); 
            else setNavStack([{ id: 'domain', title: 'BLIND RANK' }]);
          };

          return (
            <div className="relative w-full h-[100dvh] bg-[#030305] overflow-hidden body-font select-none text-white antialiased">
              
              <button 
                  onClick={toggleFullscreen} 
                  className="fixed top-4 right-4 z-[9999] w-10 h-10 rounded-full glass-ultra border-white/20 flex items-center justify-center text-white hover:bg-white/10 active:scale-95 transition-all shadow-[0_4px_15px_rgba(0,0,0,0.5)]"
                  title="Toggle Fullscreen"
              >
                  {isFullscreen ? <MinimizeIcon size={18} /> : <MaximizeIcon size={18} />}
              </button>

              <video 
                ref={videoRef} 
                autoPlay={true} 
                playsInline={true} 
                muted={true} 
                className="absolute inset-0 w-full h-full object-cover z-0"
                style={{ 
                    opacity: phase === 'playing' ? 1 : 0.01,
                    transform: 'scaleX(-1)',
                    WebkitTransform: 'scaleX(-1)'
                }} 
              />
              
              <canvas ref={canvasRef} className="fixed top-[-9999px] left-[-9999px] pointer-events-none opacity-0" />
              
              {(phase === 'menu' || phase === 'result') && (
                <div 
                    className={`absolute inset-0 ${phase === 'menu' ? 'z-10' : 'z-[55]'} mix-blend-screen opacity-60 transition-all duration-1000 pointer-events-none`}
                    style={{ background: `radial-gradient(circle at 10% 0%, ${activeTheme.primary}33, transparent 60%), radial-gradient(circle at 90% 100%, ${activeTheme.secondary}33, transparent 60%)` }} 
                />
              )}

              {phase === 'playing' && hasStarted && (
                <div className="absolute top-[env(safe-area-inset-top,2rem)] inset-x-4 sm:inset-x-6 flex justify-between items-start z-50 pointer-events-auto pt-2 animate-fade-in pr-12">
                  <div className="flex flex-col gap-2.5">
                      <button onClick={back} className="w-11 h-11 rounded-full bg-black/40 backdrop-blur-md border border-white/10 flex items-center justify-center hover:bg-white/10 active:scale-95 transition-all shadow-[0_4px_15px_rgba(0,0,0,0.5)]">
                          <ArrowLeft size={20} />
                      </button>

                      {lastAction && !rolling && (
                        <button onClick={undo} className="w-11 h-11 rounded-full bg-black/50 backdrop-blur-md border border-white/20 flex items-center justify-center active:scale-95 transition-all shadow-md anim-shimmer" style={{ borderColor: activeTheme.primary + '55' }}>
                            <UndoIcon size={18} style={{ color: activeTheme.primary }} />
                        </button>
                      )}

                      {recordStatus === 'recording' && (
                        <div className="bg-black/50 backdrop-blur-md px-3 py-1.5 rounded-full flex items-center gap-2 border border-white/5 shadow-md">
                          <div className="w-2.5 h-2.5 rounded-full bg-[#FF3D5A]" />
                          <span className="display-font text-[11px] font-black tracking-widest text-white">REC</span>
                        </div>
                      )}
                  </div>

                  <div className="flex flex-col items-end gap-2">
                      <div className="bg-black/40 backdrop-blur-md px-4 py-2.5 rounded-[16px] border border-white/10 flex flex-col items-end shadow-[0_4px_15px_rgba(0,0,0,0.5)]">
                        <span ref={timerRef} className="display-font font-black text-[15px] tracking-widest" style={{ color: activeTheme.primary }}>0.0s</span>
                        <span className="display-font text-[9px] text-white/70 mt-0.5 font-bold tracking-widest uppercase">{challengeTitle}</span>
                      </div>

                      <div className="bg-black/40 backdrop-blur-md px-3 py-1.5 rounded-full flex items-center gap-2 border border-white/10 shadow-md">
                        <span ref={progressRef} className="display-font font-black text-[13px]" style={{ color: activeTheme.primary }}>0/10</span>
                        <span className="display-font text-[9px] font-bold tracking-widest text-white/50 uppercase">PLACED</span>
                        <div ref={faceIndicatorRef} className="w-2 h-2 rounded-full transition-colors duration-500" style={{ backgroundColor: 'rgba(255,255,255,0.25)' }} />
                      </div>
                  </div>
                </div>
              )}

              {phase === 'playing' && !hasStarted && (
                 <div className="absolute inset-0 z-[100] flex flex-col items-center justify-center bg-black/40 backdrop-blur-sm">
                    <button onClick={startGameplay} className="group relative w-64 h-64 flex items-center justify-center animate-fade-in">
                        <div className="absolute inset-0 rounded-full anim-pulse-ring" style={{ backgroundColor: activeTheme.primary }}></div>
                        <div className="glass-card relative z-10 w-48 h-48 rounded-full flex flex-col items-center justify-center border-4 shadow-2xl active:scale-95 transition-transform" style={{ borderColor: activeTheme.primary }}>
                             <PlayIcon size={48} className="text-white ml-2 mb-2 drop-shadow-md" fill="white" />
                             <span className="display-font font-black text-xl tracking-widest uppercase">TAP TO START</span>
                        </div>
                    </button>
                    <p className="display-font font-bold text-[11px] tracking-[0.25em] text-white/50 mt-8 uppercase animate-fade-in stagger-2">{challengeTitle}</p>
                 </div>
              )}

              <div ref={cardRef} className="fixed z-40 pointer-events-none flex flex-col items-center transition-all duration-100 opacity-0">
                  <div className={`relative w-[130px] h-[130px] rounded-[24px] border-[3px] shadow-[0_15px_35px_rgba(0,0,0,0.6)] flex items-center justify-center overflow-hidden bg-white/5 ${!rolling ? 'anim-card-glow' : ''}`} style={{ borderColor: activeTheme.primary }}>
                      {queue[activeIndex] && !rolling ? (
                          <img src={queue[activeIndex].img} className="w-full h-full object-cover bg-white" />
                      ) : (
                          <Loader2 className="animate-spin" size={30} style={{ color: activeTheme.primary }} />
                      )}
                  </div>
                  <div className="mt-3 px-4 py-1.5 rounded-full display-font font-black text-[12px] tracking-widest uppercase shadow-lg truncate max-w-[160px]" style={{ backgroundColor: activeTheme.primary, color: '#030305' }}>
                      {rolling ? "..." : (queue[activeIndex]?.name || "")}
                  </div>
              </div>

              {phase === 'playing' && hasStarted && (
                <div className="absolute left-6 top-[15%] bottom-[12%] w-[65px] sm:w-[75px] grid grid-rows-10 gap-1.5 sm:gap-2 z-50 py-1">
                  {slots.map((p, i) => (
                    <div key={i} className="relative w-full h-full flex items-center">
                        <span className="absolute -left-5 display-font font-black text-[15px] sm:text-[16px]" style={{ color: activeTheme.primary, textShadow: '0 1px 4px rgba(0,0,0,0.8)' }}>
                            {i + 1}
                        </span>
                        <button
                            onClick={() => place(i)}
                            disabled={!!p || rolling}
                            className={`w-full h-full rounded-[12px] sm:rounded-[14px] border-[1.5px] overflow-hidden relative flex items-center justify-center transition-all ${
                                flashSlot === i ? 'anim-slot-pop' : ''
                            } ${p ? 'border-white/50 bg-black/30' : 'border-white/20 bg-black/40 backdrop-blur-sm hover:border-white/40 active:scale-95'}`}
                            style={p ? { 
                                boxShadow: `0 0 14px 2px ${activeTheme.primary}50, 0 4px 12px rgba(0,0,0,0.5)`,
                                borderColor: activeTheme.primary + '80'
                            } : {}}
                        >
                            {p ? (
                                <img src={p.img} className="w-full h-full object-cover bg-white" />
                            ) : (
                                <div className="w-1.5 h-1.5 rounded-full bg-white/30" />
                            )}
                        </button>
                    </div>
                  ))}
                </div>
              )}

              {phase === 'menu' && (
                <div className="absolute inset-0 z-50 flex flex-col px-4 sm:px-8 pt-safe pb-safe overflow-y-auto no-scrollbar">
                  <div className="w-full max-w-lg mx-auto flex flex-col min-h-full py-6 pr-6">
                    <div className="flex items-center justify-between mb-8 shrink-0 relative px-2">
                      {navStack.length > 1 ? (
                        <button onClick={back} className="w-12 h-12 rounded-full glass-ultra border-white/20 hover:bg-white/10 flex items-center justify-center active:scale-95 transition-all shadow-lg relative z-10">
                          <ArrowLeft size={20} />
                        </button>
                      ) : (
                         <div className="w-12 h-12 flex items-center justify-center glass-ultra rounded-full border-white/10">
                             <TrendingUp size={20} style={{ color: activeTheme.primary }} />
                         </div>
                      )}
                      <div className="absolute inset-x-0 text-center pointer-events-none flex flex-col items-center">
                        <h1 className="display-font text-[22px] font-black tracking-[0.25em] uppercase text-white drop-shadow-[0_0_15px_rgba(255,255,255,0.4)]">
                          {currentNavObj.title}
                        </h1>
                        {navStack.length > 1 && <div className="h-1 w-12 rounded-full mt-1.5 opacity-80" style={{ backgroundColor: activeTheme.primary }}></div>}
                      </div>
                      <div className="w-12" />
                    </div>

                    {error && (
                      <div className="mb-6 p-4 bg-red-500/20 border border-red-500/40 rounded-[20px] flex items-start gap-3 text-red-50 anim-pop shadow-lg backdrop-blur-md">
                        <AlertCircle size={20} className="shrink-0 mt-0.5 text-red-400" />
                        <span className="text-[13px] font-semibold leading-tight tracking-wide">{error}</span>
                      </div>
                    )}

                    <div className="flex-1 pb-10">
                      {loading ? (
                        <div className="h-64 flex flex-col items-center justify-center gap-6 animate-fade-in">
                          <div className="relative">
                              <Loader2 className="animate-spin" style={{ color: activeTheme.primary }} size={50} />
                              <div className="absolute inset-0 blur-xl opacity-50" style={{ backgroundColor: activeTheme.primary }}></div>
                          </div>
                          <span className="display-font text-[13px] font-black uppercase tracking-[0.3em] opacity-90" style={{ color: activeTheme.primary }}>Syncing Database</span>
                        </div>
                      ) : (
                        <>
                          {currentMenuId === 'domain' && (
                            <div className="grid grid-cols-1 gap-5 mt-2">
                              {currentMenuItems.map((item, i) => (
                                <button key={item.id} onClick={() => handleMenuClick(item)} 
                                  className={`w-full flex items-center p-6 rounded-[32px] active:scale-[0.97] transition-all border shadow-[0_15px_40px_-10px_rgba(0,0,0,0.5)] group relative overflow-hidden animate-fade-in stagger-${i+1} bg-gradient-to-r ${item.bg} ${item.border} hover:border-white/50 backdrop-blur-md`}>
                                  <div className="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500 bg-white/5" />
                                  <div className="shrink-0 w-20 h-20 rounded-full bg-black/40 flex items-center justify-center shadow-inner border border-white/10 group-hover:scale-110 transition-transform duration-300 drop-shadow-[0_0_15px_currentColor]">
                                      {item.icon}
                                  </div>
                                  <div className="ml-5 flex flex-col items-start text-left relative z-10 flex-1">
                                      <span className="display-font font-black text-[22px] tracking-[0.15em] text-white drop-shadow-md">{item.name}</span>
                                      <span className="body-font text-[11px] mt-1 font-bold tracking-[0.1em] text-white/70 uppercase leading-snug">{item.desc}</span>
                                  </div>
                                  <ChevronRight size={24} className="text-white/30 group-hover:text-white/70 transition-colors" />
                                </button>
                              ))}
                            </div>
                          )}
                          {currentMenuId !== 'domain' && (
                              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mt-2">
                                  {currentMenuItems.map((item, i) => (
                                    <button key={item.id} onClick={() => handleMenuClick(item)} 
                                      className={`w-full flex items-center justify-between glass-ultra p-4 sm:p-5 rounded-[24px] active:scale-[0.98] transition-all hover:bg-white/10 animate-fade-in stagger-${(i%5)+1}
                                        ${item.type === 'nav' ? 'border-white/15 bg-white/5' : 'border-white/5'} 
                                        ${i < 2 && item.type !== 'nav' ? 'col-span-1 sm:col-span-2' : ''}`}
                                      style={i < 2 && item.type !== 'nav' ? { background: `linear-gradient(135deg, ${activeTheme.primary}22, transparent)` } : {}}>
                                      <div className="flex items-center gap-4">
                                        <span className="text-2xl drop-shadow-[0_0_15px_rgba(255,255,255,0.2)] bg-black/50 w-12 h-12 flex items-center justify-center rounded-[16px] shadow-inner border border-white/10">
                                            {item.icon}
                                        </span>
                                        <div className="flex flex-col items-start text-left">
                                          <span className="display-font font-black text-[15px] tracking-wider text-white leading-tight">{item.name}</span>
                                          {item.desc && <span className="body-font text-[10px] font-bold tracking-[0.15em] mt-1.5 opacity-80 uppercase" style={{ color: activeTheme.primary }}>{item.desc}</span>}
                                        </div>
                                      </div>
                                      <div className="w-10 h-10 rounded-full flex items-center justify-center bg-black/40 border border-white/10 shrink-0 shadow-inner">
                                          {item.type === 'nav' ? (
                                            <ChevronRight size={18} style={{ color: activeTheme.primary }} />
                                          ) : (
                                            <PlayIcon size={16} style={{ color: activeTheme.primary }} fill={activeTheme.primary} className="ml-1" />
                                          )}
                                      </div>
                                    </button>
                                  ))}
                              </div>
                          )}
                        </>
                      )}
                    </div>
                  </div>
                </div>
              )}

              {phase === 'result' && (
                <div className="absolute inset-0 z-[60] glass-panel flex flex-col px-4 sm:px-10 pt-safe pb-safe overflow-y-auto no-scrollbar">
                  <div className="flex justify-between items-end mb-10 text-left shrink-0 mt-6 pr-10 animate-fade-in">
                    <div className="min-w-0 pr-4">
                      <p className="display-font font-black text-[11px] tracking-[0.3em] mb-2 uppercase drop-shadow-[0_0_15px_currentColor]" style={{ color: activeTheme.primary }}>Session Complete</p>
                      <h2 className="display-font text-3xl sm:text-4xl font-black leading-none truncate text-white uppercase block drop-shadow-[0_0_30px_rgba(255,255,255,0.4)]">
                        {challengeTitle}
                      </h2>
                    </div>
                    <button onClick={() => { 
                        setNavStack([{ id: 'domain', title: 'BLIND RANK' }]); 
                        setPhase('menu'); 
                        setActiveOverride(null);
                        setLoading(false); 
                        setError(null);
                    }} className="w-14 h-14 glass-ultra border-white/30 rounded-full hover:bg-white/15 text-white active:scale-95 transition-all shadow-[0_15px_40px_rgba(0,0,0,0.5)] shrink-0 flex items-center justify-center relative z-20">
                      <RefreshCw size={24} />
                    </button>
                  </div>
                  
                  <div className="space-y-4 mb-12 flex-1">
                    {slots.filter(p=>p).map((p, i) => (
                      <div key={i} className={`flex items-center gap-4 p-4 rounded-[24px] border-[1.5px] transition-all animate-fade-in stagger-${(i%5)+1} ${i === 0 ? 'shadow-[0_20px_50px_rgba(0,0,0,0.6)] scale-[1.03] border-none z-10 relative' : 'glass-ultra border-white/20 hover:border-white/40'}`} style={i === 0 ? { background: `linear-gradient(135deg, ${activeTheme.primary}, ${activeTheme.secondary})`, color: (topDomain !== 'movies' && topDomain !== 'tv' ? '#fff' : '#030305') } : {}}>
                        <span className={`display-font w-8 font-black text-[28px] text-center shrink-0 ${i === 0 ? ((topDomain !== 'movies' && topDomain !== 'tv') ? 'text-white/50' : 'text-[#030305]/40') : 'text-white/30'}`}>{i + 1}</span>
                        <div className={`w-14 h-14 rounded-[16px] overflow-hidden shrink-0 bg-white ${i === 0 ? 'border border-[#030305]/20 shadow-inner' : 'border border-white/20'}`}>
                          {p?.imgObj && <img src={p.imgObj.src} crossOrigin="anonymous" className="w-full h-full object-cover" alt=""/>}
                        </div>
                        <div className="flex-1 min-w-0 flex flex-col justify-center">
                          <p className="display-font font-black text-[15px] sm:text-[16px] uppercase tracking-widest text-left break-words line-clamp-2 leading-tight">{p?.name}</p>
                        </div>
                        {i === 0 && <StarIcon size={24} fill={(topDomain !== 'movies' && topDomain !== 'tv') ? '#fff' : '#030305'} className={`ml-2 shrink-0 ${(topDomain !== 'movies' && topDomain !== 'tv') ? 'text-white' : 'text-[#030305]'}`} />}
                      </div>
                    ))}
                  </div>

                  <div className="shrink-0 flex flex-col gap-3 mb-6 animate-fade-in stagger-5">
                    {lastAction && (
                      <button onClick={undo} className="w-full py-4 rounded-[24px] glass-ultra text-white display-font font-black tracking-[0.15em] text-[13px] flex items-center justify-center gap-3 active:scale-[0.98] hover:bg-white/10 transition-all border-white/20 shadow-lg">
                        <UndoIcon size={18} /> UNDO LAST PLACEMENT
                      </button>
                    )}

                    {recordStatus === 'error' && (
                       <div className="w-full py-5 rounded-[24px] bg-red-500/20 border border-red-500/50 text-white display-font font-black tracking-widest text-[12px] flex items-center justify-center gap-3 text-center px-4 shadow-[0_10px_30px_rgba(255,61,90,0.2)]">
                          <AlertCircle size={20} /> SCREEN RECORDING UNSUPPORTED

                    {lastCategoryRef.current && (

                      <Share2 size={20} /> SHARE RANKING LIST
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
